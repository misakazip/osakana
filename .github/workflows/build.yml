name: Build Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 ──────────────────────────────────────────────
          - os: windows-latest
            artifact: osakana-windows-x64.exe
            src_path: dist/osakana.exe

          # ── Windows ARM64 ────────────────────────────────────────────
          - os: windows-11-arm
            artifact: osakana-windows-arm64.exe
            src_path: dist/osakana.exe

          # ── Linux x86_64 ─────────────────────────────────────────────
          - os: ubuntu-latest
            artifact: osakana-linux-x64
            src_path: dist/osakana

          # ── Linux ARM64 ──────────────────────────────────────────────
          - os: ubuntu-24.04-arm
            artifact: osakana-linux-arm64
            src_path: dist/osakana

    runs-on: ${{ matrix.os }}

    steps:
      # ── チェックアウト ────────────────────────────────────────────────────
      - uses: actions/checkout@v6

      # ── Python セットアップ ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # ── Python 依存パッケージのインストール ─────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # ── Qt + UPX システムライブラリのインストール（Linux） ───────────────────────────
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libegl1 \
            libglib2.0-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            upx-ucl

      # ── UPX のインストール（Windows） ────────────────────────────────────────
      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --yes --no-progress

      # ── バイナリのビルド ────────────────────────────────────────────────────────
      - name: Build binary
        run: pyinstaller osakana.spec

      # ── アーティファクトのリネーム ─────────────────────────────────────────────
      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.src_path }}" "dist/${{ matrix.artifact }}"

      # ── アーティファクトのアップロード（毎回実行） ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      # ── GitHub Release へのアタッチ（タグプッシュ時のみ） ───────────────────
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
