name: Build Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 ──────────────────────────────────────────────
          - os: windows-latest
            artifact: osakana-windows-x64.exe
            src_path: dist/osakana.exe

          # ── Windows ARM64 ────────────────────────────────────────────
          - os: windows-11-arm
            artifact: osakana-windows-arm64.exe
            src_path: dist/osakana.exe

          # ── Linux x86_64 ─────────────────────────────────────────────
          - os: ubuntu-latest
            artifact: osakana-linux-x64
            src_path: dist/osakana

          # ── Linux ARM64 ──────────────────────────────────────────────
          - os: ubuntu-24.04-arm
            artifact: osakana-linux-arm64
            src_path: dist/osakana

          # ── macOS ARM64 ──────────────────────────────────────────────
          - os: macos-latest
            artifact: osakana-macos-arm64
            src_path: dist/osakana

    runs-on: ${{ matrix.os }}

    steps:
      # ── チェックアウト ────────────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # ── Python セットアップ ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      # ── Python 依存パッケージのインストール ─────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # ── Qt + UPX システムライブラリのインストール（Linux） ───────────────────────────
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libegl1 \
            libglib2.0-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libfontconfig1 \
            upx-ucl

      # ── UPX のインストール（Windows） ────────────────────────────────────────
      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --yes --no-progress

      # ── バイナリのビルド ────────────────────────────────────────────────────────
      - name: Build binary
        run: pyinstaller osakana.spec

      # ── アーティファクトのリネーム ─────────────────────────────────────────────
      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.src_path }}" "dist/${{ matrix.artifact }}"

      # ── チェックサムの計算 ─────────────────────────────────────────────────────
      - name: Compute checksum
        shell: bash
        run: |
          cd dist
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
          cat "${{ matrix.artifact }}.sha256"

      # ── ビルド成果物の SLSA 証明書を発行 ───────────────────────────────────────
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.artifact }}

      # ── アーティファクトのアップロード（毎回実行） ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256

  # ── リリース公開（タグプッシュ時のみ） ─────────────────────────────────────
  # build ジョブから contents:write を切り離し、リリース操作を最小権限ジョブに集約する。
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Create combined checksums.txt
        run: |
          cat dist/*.sha256 | sort > dist/checksums.txt
          cat dist/checksums.txt

      - name: Upload binaries and checksums to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/osakana-*
            dist/checksums.txt

      - name: Append build info to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          CHECKSUMS=$(cat dist/checksums.txt)
          CURRENT_BODY=$(gh release view "$TAG" --json body --jq '.body')
          gh release edit "$TAG" --notes "${CURRENT_BODY}

          ## Build Information
          **Actions Run:** ${RUN_URL}

          ### SHA256 Checksums
          \`\`\`
          ${CHECKSUMS}
          \`\`\`"
